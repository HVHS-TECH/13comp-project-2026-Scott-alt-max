<!DOCTYPE html>
<html>
    <head>
        <title>Insane Games</title>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">

        <link rel="stylesheet" href="registration.css">
    </head>
    <body class="reg-body">
        <div class="reg-box" id="not-logged-in-box">
            <div class="box-body">
                <h2>Not Logged In</h2>
                <div class="box-info">
                    <p>You must be logged in to continue</p>
                    <p>If you are new to Insane Games, please sign-up</p>
                </div>
            </div>
            <div class="box-foot">
                <div class="reg-link red" onclick="signUp()">
                    <p>Sign-up</p>
                </div>
                <div class="reg-link green">
                    <p>Login</p>
                </div>
            </div>
        </div>
        <div class="reg-box" id="not-a-user-box">
            <div class="box-body">
                <h2>Oops!</h2>
                <div class="box-info">
                    <p>It looks like you are not in our system</p>
                </div>
            </div>
            <div class="box-foot">
                <div class="reg-link red">
                    <p>Sign-up</p>
                </div>
            </div>
        </div>
        <div class="reg-box" id="already-a-user-box">
            <div class="box-body">
                <h2>Oops!</h2>
                <div class="box-info">
                    <p>It looks like you are already in our system</p>
                </div>
            </div>
            <div class="box-foot">
                <div class="reg-link red">
                    <p>Sign-up with new account</p>
                </div>
                <div class="reg-link green">
                    <p>Login with old account</p>
                </div>
            </div>
        </div>
        <div class="reg-box default-box" id="sign-up-box">
            <div class="box-body">
                <h2>Sign Up</h2>
                <div class="box-info">
                    <form id="sign-up-form">
                        <div class="feild">
                            <div class="label-wrapper"><label>Name:</label></div>
                            <div class="input-wrapper">
                                <input type="text" id="name" required>
                            </div>
                        </div>

                        <div class="feild">
                            <div class="label-wrapper"><label>Age:</label></div>
                            <div class="input-wrapper">
                                <input type="number" id="age" required>
                            </div>
                        </div>

                        <div class="feild">
                            <div class="label-wrapper"><label>Address:</label></div>
                            <div class="input-wrapper">
                                <input type="text" id="address" required>
                            </div>
                        </div>

                        <div class="feild">
                            <div class="label-wrapper"><label>Email:</label></div>
                            <div class="input-wrapper">
                                <input type="text" id="email" required>
                            </div>
                        </div>

                        <div class="feild">
                            <div class="label-wrapper"><label>Skill Level:</label></div>
                            <div class="input-wrapper">
                                <input type="text" id="skill">
                            </div>
                        </div>

                        <div class="feild">
                            <div class="label-wrapper"><label>Games Played:</label></div>
                            <div class="input-wrapper">
                                <input type="number" id="games-played">
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="box-foot">
                <div class="reg-link red">
                    <p>Submit</p>
                </div>
            </div>
        </div>
    </body>
    <script type="module" src="firebaseFunctions.mjs"></script>
    <script src="registration.js"></script>
</html>
