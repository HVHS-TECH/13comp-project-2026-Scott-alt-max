<!DOCTYPE html>
<html>
    <head>
        <title>Insane Games</title>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">

        <link rel="stylesheet" href="registration.css">
    </head>
    <body class="reg-body">
        <div class="reg-box" id="not-logged-in-box">
            <div class="box-body">
                <h2>Not Logged In</h2>
                <div class="box-info">
                <p>You must be logged in to continue</p>
                </div>
            </div>
            <div class="box-foot">
                <a class="reg-link red">
                    <p>Sign-up</p>
                </a>
                <a class="reg-link green">
                    <p>Login</p>
                </a>
            </div>
        </div>
        <div class="reg-box" id="not-a-user-box">
            <div class="box-body">
                <h2>Oops!</h2>
                <div class="box-info">
                    <p>It looks like you are not in our system</p>
                </div>
            </div>
            <div class="box-foot">
                <a class="reg-link red">
                    <p>Sign-up</p>
                </a>
            </div>
        </div>
        <div class="reg-box" id="already-a-user-box">
            <div class="box-body">
                <h2>Oops!</h2>
                <div class="box-info">
                    <p>It looks like you are already in our system</p>
                </div>
            </div>
            <div class="box-foot">
                <a class="reg-link red">
                    <p>Sign-up with new account</p>
                </a>
                <a class="reg-link green">
                    <p>Login with old account</p>
                </a>
            </div>
        </div>
        <div class="reg-box" id="sign-up-box">
            <div class="box-body">
                <h2>Sign Up</h2>
                <div class="box-info">
                    <p>Sign up form</p>
                </div>
            </div>
            <div class="box-foot">
                <a class="reg-link red">
                    <p>Sign-up</p>
                </a>
            </div>
        </div>
    </body>
    <script src="registration.js"></script>
</html>
