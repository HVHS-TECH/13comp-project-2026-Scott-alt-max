<!DOCTYPE html>
<html>
    <head>
        <title>Insane Games</title>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">

        <link rel="stylesheet" href="registration.css">
    </head>
    <body class="reg-body">
        <div class="reg-box" id="not-logged-in-box">
            <div class="box-body">
                <h2>You Must Be <br> Logged In</h2>
            </div>
            <div class="box-foot two-buttons">
                <a class="reg-link">
                    <div class="box-button left red">
                        <p>Sign-up</p>
                    </div>
                </a>
                <a class="reg-link">
                    <div class="box-button right green">
                        <p>Login</p>
                    </div>
                </a>
            </div>
        </div>
        <div class="reg-box" id="not-a-user-box">
            <div class="box-body">
                <h2>Oops!</h2>
                    <p>It looks like you are not in our system</p>
            </div>
            <div class="box-foot two-buttons">
                <a class="reg-link">
                    <div class="box-button left red">
                        <p>Sign-up</p>
                    </div>
                </a>
                <a class="reg-link">
                    <div class="box-button right green">
                        <p>Login</p>
                    </div>
                </a>
            </div>
        </div>
    </body>
    <script src="registration.js"></script>
</html>
