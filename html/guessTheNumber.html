<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Scott’s Psychedelic Games</title>
        <meta charset="UTF-8">
        <meta name="description" content="12COMP P5.play">
        <meta name="keywords" content="12COMP, P5.play">
        <meta name="author" content="Scott">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Link to the CSS files for styling -->
        <link rel="stylesheet" href="../css/nav.css">
        <link rel="stylesheet" href="../css/guessTheNumber.css">
    </head>

    <body>
        <nav>
            <h1 class="logo"><a href="index.html">Insane Games</a></h1>
            <div class="nav-right">
                <div class="logout-cont">
                    <div onclick="logoutFirebase()" class="logout-button">
                        Log out
                    </div>
                </div>
                <div class="profile-button">
                    <div class="profile-picture"><div>
                </div>
            </div>
        </nav>
        <main>
            <div class="gtn-box default-box" id="landing-page-box">
                <button onclick="onCreateLobbyPressed()">
                    create lobby
                </button>
                <button onclick="onJoinLobbyPressed()">
                    join random lobby
                </button>
            </div>
            <div class="gtn-box" id="waiting-for-guest-box">
                <h2>Go get a friend</h2>
            </div>
            <div class="gtn-box" id="game-box">
                <div class="your-turn-box">
                    <p class="opponent-guess">Your opponent guessed: <span>54</span></p>
                    <input class="guess-button" type="number" min="0" max="100">
                    <button>Guess</button>
                </div>
                <div class="not-your-turn-box">
                    <h2>Waiting for your opponent to guess</h2>
                </div>
            </div>
            <div class="gtn-box" id="game-over-box">
                <h2>Game Over</h2>
                <p>Would you like to play again?</p>
                <p class="want-rematch">Your friend wants to play again!</p>
                <p class="no-rematch">Your friend left you :/</p>
                <button>Rematch</button><button>Leave</button>
            </div>
            <div class="gtn-box" id="waiting-for-rematch-box">
                <h2>Waiting for your friend to accept rematch</h2>
                <button>Cancel rematch</button>
            </div>
        </main>
    </body>

    <script type="module" src="../js/firebaseFunctions.mjs"></script>
    <script src="../js/guessTheNumber.js"></script>
</html>
